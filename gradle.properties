# ?? Gradle daemon / performance ?????????????????????????????????????????????
org.gradle.daemon=true
org.gradle.jvmargs=-Xmx2g -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.caching=true

# ?? Configuration cache ??????????????????????????????????????????????????????
# Enabled as suggested by Gradle; the IntelliJ Platform Gradle Plugin 2.2.x
# claims configuration-cache compatibility.
org.gradle.configuration-cache=true

# ?? Kotlin ????????????????????????????????????????????????????????????????????
kotlin.incremental=true

# ?? Note on Gradle 10 deprecation warnings ???????????????????????????????????
# The "multi-string dependency notation" warnings are emitted by the
# IntelliJ Platform Gradle Plugin's own internal code (not by this build
# script) and cannot be suppressed or fixed here.  They will be resolved
# when the upstream plugin ships a Gradle-10-compatible release.

